name: pc_modding_app
description: A Flutter app for AI-driven PC matching and custom build recommendations.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=2.18.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  http: ^0.13.6
  provider: ^6.0.5
  flutter_dotenv: ^5.0.3
  firebase_core: ^2.12.0
  firebase_auth: ^4.7.0
  cloud_firestore: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
